# End-to-End Training Config (Stage 2)
# LoRA on VLM visual encoder + temporal head — requires A100 80GB

vlm:
  model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "eager"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  # "qkv" targets the fused Q/K/V projection in each ViT block
  # This applies LoRA ONLY to the visual encoder (LM uses q_proj/k_proj/v_proj)
  target_modules: ["qkv"]

temporal:
  # MUST match Stage 1 config (from EXP-009)
  d_vision: 1280         # actual VLM visual encoder hidden dim
  d_branch: 32
  n_branches: 4
  temporal_hidden: 16
  temporal_out: 16
  temporal_kernel: 7
  n_heads: 1
  n_attn_layers: 1
  num_frames: 16
  # Checkpoint pattern — {fold} is replaced at runtime
  checkpoint: "${VLM_WORK_ROOT}/checkpoints/temporal_v1/fold_{fold}/best_model.pt"

loss:
  focal_gamma: 2.0
  label_smoothing: 0.1

training:
  num_epochs: 5
  lora_lr: 2.0e-5        # LoRA adapters: small LR to not destroy pretrained VLM
  temporal_lr: 2.0e-4     # temporal head: same LR as Stage 1
  weight_decay: 1.0e-4
  grad_clip: 1.0
  grad_accum_steps: 16    # effective batch size = 1 * 16 = 16
  early_stop_patience: 3
  imbalance_ratio_threshold: 1.25

output:
  dir: "${VLM_WORK_ROOT}/checkpoints/e2e_v1"

hardware:
  device: "auto"
  seed: 42
  num_workers: 0          # safest on NFS / Slurm
